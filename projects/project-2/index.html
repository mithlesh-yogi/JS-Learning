<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
        <h2>BMI calculater</h3>
        <div class="input-boxes">
            <p class="input-box">Height in cm <span><input class="input" type="text" id="height"></span></p>
            <p class="input-box">weight in Kg <span><input class="input" type="text" id="weight"></span></p>
            <button class="button">Calculate</button>
            <div class="results"></div>
        </div>
        <div class="content">
            <h3>BMI weight guide</h3>
            <p>under weight = less than 18.6</p>
            <p>Normal range = less than 18.6 and 24.9</p>
            <p>Overweight = Greater than 24.9</p>
        </div>
</body>
<script src="main.js"></script>
</html>
